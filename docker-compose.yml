version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - redis
      - kafka
    environment:
      DJANGO_SECRET_KEY: dev-secret-key-change-me
      DJANGO_DEBUG: "1"
      DJANGO_AUTORELOAD: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pixelwar}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      MYSQL_HOST: ${MYSQL_HOST:-host.docker.internal}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      REDIS_URL: redis://redis:6379/1
      CHANNEL_REDIS_URL: redis://redis:6379/2
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_PIXEL_TOPIC: pixel-updates
      KAFKA_CHAT_TOPIC: chat-messages
      PIXEL_COOLDOWN_SECONDS: "60"
      PIXEL_INITIAL_GRID_SIZE: "200"
      PIXEL_GRID_EXPAND_STEP: "20"
      PIXEL_GRID_FILL_EXPAND_THRESHOLD: "0.8"
      PIXEL_GRID_MAX_SIZE: "1000"
    command: sh -c "python manage.py collectstatic --noinput && daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - .:/app
    ports:
      - "8099:8000"

  consumer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - redis
      - kafka
    environment:
      DJANGO_SECRET_KEY: dev-secret-key-change-me
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pixelwar}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      MYSQL_HOST: ${MYSQL_HOST:-host.docker.internal}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      REDIS_URL: redis://redis:6379/1
      CHANNEL_REDIS_URL: redis://redis:6379/2
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_PIXEL_TOPIC: pixel-updates
      KAFKA_CHAT_TOPIC: chat-messages
      PIXEL_COOLDOWN_SECONDS: "60"
      PIXEL_GRID_SIZE: "500"
    command: sh -c "python manage.py migrate && python manage.py consume_pixel_updates"
    volumes:
      - .:/app
