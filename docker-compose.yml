version: "3.9"

services:
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
      AUTH_TYPE: LOGIN_FORM
      SPRING_SECURITY_USER_NAME: ${DJANGO_SUPERUSER_USERNAME:-}
      SPRING_SECURITY_USER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-}
    ports:
      - "8082:8080"

  redis:
    image: redis:7.2-alpine
    restart: on-failure:3
    ports:
      - "6379:6379"

  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: dev-secret-key-change-me
      DJANGO_DEBUG: "1"
      DJANGO_AUTORELOAD: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pixelwar}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      MYSQL_HOST: ${MYSQL_HOST:-host.docker.internal}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      REDIS_URL: redis://redis:6379/1
      CHANNEL_REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/3
      CELERY_RESULT_BACKEND: redis://redis:6379/4
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_PIXEL_TOPIC: pixel-updates
      KAFKA_CHAT_TOPIC: chat-messages
      PIXEL_COOLDOWN_SECONDS: "60"
      PIXEL_INITIAL_GRID_SIZE: "200"
      PIXEL_GRID_EXPAND_STEP: "20"
      PIXEL_GRID_FILL_EXPAND_THRESHOLD: "0.8"
      PIXEL_GRID_MAX_SIZE: "1000"
    command: sh -c "npm install && chmod +x node_modules/.bin/tailwindcss && npm run build:css && python manage.py collectstatic --noinput && daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - .:/app
    ports:
      - "8099:8000"

  consumer:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: dev-secret-key-change-me
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pixelwar}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      MYSQL_HOST: ${MYSQL_HOST:-host.docker.internal}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      REDIS_URL: redis://redis:6379/1
      CHANNEL_REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/3
      CELERY_RESULT_BACKEND: redis://redis:6379/4
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_PIXEL_TOPIC: pixel-updates
      KAFKA_CHAT_TOPIC: chat-messages
      PIXEL_COOLDOWN_SECONDS: "60"
      PIXEL_GRID_SIZE: "500"
    command: sh -c "python manage.py consume_pixel_updates"
    volumes:
      - .:/app

  celery:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - redis
      - web
    environment:
      DJANGO_SECRET_KEY: dev-secret-key-change-me
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pixelwar}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      MYSQL_HOST: ${MYSQL_HOST:-host.docker.internal}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      REDIS_URL: redis://redis:6379/1
      CHANNEL_REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/3
      CELERY_RESULT_BACKEND: redis://redis:6379/4
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_PIXEL_TOPIC: pixel-updates
      KAFKA_CHAT_TOPIC: chat-messages
    command: sh -c "celery -A config worker -l info"
    volumes:
      - .:/app

  flower:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - redis
      - celery
    environment:
      DJANGO_SECRET_KEY: dev-secret-key-change-me
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pixelwar}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      MYSQL_HOST: ${MYSQL_HOST:-host.docker.internal}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      REDIS_URL: redis://redis:6379/1
      CHANNEL_REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/3
      CELERY_RESULT_BACKEND: redis://redis:6379/4
    command: sh -c "if [ -z \"$DJANGO_SUPERUSER_USERNAME\" ] || [ -z \"$DJANGO_SUPERUSER_PASSWORD\" ]; then echo 'Missing DJANGO_SUPERUSER_USERNAME or DJANGO_SUPERUSER_PASSWORD for Flower auth.' && exit 1; fi; celery -A config flower --port=5555 --basic_auth=\"$DJANGO_SUPERUSER_USERNAME:$DJANGO_SUPERUSER_PASSWORD\""
    volumes:
      - .:/app
    ports:
      - "5555:5555"
