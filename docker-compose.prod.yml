version: "3.9"

services:
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped

  web:
    image: ${DOCKER_IMAGE}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      DJANGO_DEBUG: "0"
      REDIS_URL: redis://redis:6379/1
      CHANNEL_REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/3
      CELERY_RESULT_BACKEND: redis://redis:6379/4
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    command: sh -c "python manage.py collectstatic --noinput && daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    ports:
      - "8099:8000"

  consumer:
    image: ${DOCKER_IMAGE}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      DJANGO_DEBUG: "0"
      REDIS_URL: redis://redis:6379/1
      CHANNEL_REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/3
      CELERY_RESULT_BACKEND: redis://redis:6379/4
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    command: sh -c "python manage.py consume_pixel_updates"

  celery:
    image: ${DOCKER_IMAGE}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      DJANGO_DEBUG: "0"
      REDIS_URL: redis://redis:6379/1
      CHANNEL_REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/3
      CELERY_RESULT_BACKEND: redis://redis:6379/4
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    command: sh -c "celery -A config worker -l info -c 2"