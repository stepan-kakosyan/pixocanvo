name: Docker Build & Push

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Docker Hub secrets
        id: docker_secrets
        shell: bash
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "DOCKERHUB_USERNAME/DOCKERHUB_TOKEN not configured. Skipping image push."
          fi

      - uses: docker/login-action@v3
        if: steps.docker_secrets.outputs.ready == 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          push: ${{ steps.docker_secrets.outputs.ready == 'true' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pixel-war:latest