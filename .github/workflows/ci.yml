name: CI/CD

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  verify:
    name: Verify Django app
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pixelwar_ci
        ports: ["3306:3306"]
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]

    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost:8000"

      MYSQL_DATABASE: pixelwar_ci
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: "3306"

      REDIS_URL: redis://localhost:6379/1
      CHANNEL_REDIS_URL: redis://localhost:6379/2

      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      KAFKA_PIXEL_TOPIC: pixel-updates
      KAFKA_CHAT_TOPIC: chat-messages

      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      EMAIL_HOST: localhost
      EMAIL_PORT: "25"
      EMAIL_USE_TLS: "0"
      EMAIL_USE_SSL: "0"
      EMAIL_HOST_USER: ""
      EMAIL_HOST_PASSWORD: ""
      DEFAULT_FROM_EMAIL: noreply@example.com
      EMAIL_ACTIVATION_TIMEOUT_SECONDS: "86400"
      PASSWORD_RESET_LINK_TTL_SECONDS: "1800"

      USE_S3: "0"

      PIXEL_COOLDOWN_SECONDS: "30"
      PIXEL_GRID_SIZE: "500"
      COMMUNITY_CREATION_PIXO_COST: "60"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Run flake8
        run: flake8 . --exclude=env,migrations,__pycache__,staticfiles

      - name: Run Django system checks
        run: python manage.py check

      - name: Run tests
        run: python manage.py test --verbosity=2

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Check Docker Hub secrets
        id: docker_secrets
        shell: bash
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "DOCKERHUB_USERNAME/DOCKERHUB_TOKEN not configured. Image push disabled."
          fi

      - uses: docker/login-action@v3
        if: steps.docker_secrets.outputs.ready == 'true' && github.ref == 'refs/heads/master'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          push: ${{ steps.docker_secrets.outputs.ready == 'true' && github.ref == 'refs/heads/master' }}
          tags: ${{ steps.docker_secrets.outputs.ready == 'true' && github.ref == 'refs/heads/master' && format('{0}/pixel-war:latest', secrets.DOCKERHUB_USERNAME) || 'pixel-war:ci' }}

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    steps:
      - name: Validate deployment secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        shell: bash
        run: |
          missing=0
          for key in DOCKERHUB_USERNAME DOCKERHUB_TOKEN DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: ${key}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more required deployment secrets are missing."
            exit 1
          fi

      - name: Deploy on server over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            DOCKER_CMD=(docker)
            if ! docker info >/dev/null 2>&1; then
              if command -v sudo >/dev/null 2>&1 && sudo -n docker info >/dev/null 2>&1; then
                DOCKER_CMD=(sudo docker)
              else
                echo "Docker daemon is not accessible for ${USER}."
                echo "Grant docker access (usermod -aG docker ${USER}) or allow passwordless sudo for docker."
                exit 1
              fi
            fi

            echo "Logging in to Docker Hub"
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | "${DOCKER_CMD[@]}" login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            export DOCKER_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/pixel-war:latest"
            echo "Deploying image: ${DOCKER_IMAGE}"
            "${DOCKER_CMD[@]}" pull "${DOCKER_IMAGE}"
            "${DOCKER_CMD[@]}" compose -f docker-compose.prod.yml up -d
            "${DOCKER_CMD[@]}" image prune -f