name: CD Deploy

on:
  workflow_run:
    workflows: ["Docker Build & Push"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'master'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Validate deployment secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        shell: bash
        run: |
          missing=0
          for key in DOCKERHUB_USERNAME DOCKERHUB_TOKEN DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: ${key}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more required deployment secrets are missing."
            exit 1
          fi

      - name: Deploy on server over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            DOCKER_CMD=(docker)
            if ! docker info >/dev/null 2>&1; then
              if command -v sudo >/dev/null 2>&1 && sudo -n docker info >/dev/null 2>&1; then
                DOCKER_CMD=(sudo docker)
              else
                echo "Docker daemon is not accessible for ${USER}."
                echo "Grant docker access (usermod -aG docker ${USER}) or allow passwordless sudo for docker."
                exit 1
              fi
            fi

            echo "Logging in to Docker Hub"
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | "${DOCKER_CMD[@]}" login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            export DOCKER_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/pixel-war:latest"
            echo "Deploying image: ${DOCKER_IMAGE}"
            "${DOCKER_CMD[@]}" pull "${DOCKER_IMAGE}"
            "${DOCKER_CMD[@]}" compose -f docker-compose.prod.yml up -d
            "${DOCKER_CMD[@]}" image prune -f